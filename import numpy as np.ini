import numpy as np
import matplotlib.pyplot as plt
from dataclasses import dataclass
from typing import Tuple, List, Optional
from scipy.stats import chi2  # For fault detection

# ────────────────────────────────────────────────
# Configuration / Parameters
# ────────────────────────────────────────────────
@dataclass
class Params:
    dt: float = 0.1          # [s]
    T_total: float = 60.0    # total simulation time [s]
    v_nom: float = 1.5       # nominal forward speed [m/s]
    yaw_rate: float = 0.03   # constant yaw rate [rad/s]  → circular-ish path
    sigma_range: float = 0.4 # std dev of range measurement [m]
    sigma_bearing: float = np.deg2rad(3.0)  # For USBL (new)
    sigma_process_xy: float = 0.07
    sigma_process_yaw: float = 0.01
    sigma_current: float = 0.05  # Process noise for current estimation

    # SLAM params
    sigma_landmark_init: float = 5.0  # Initial uncertainty for new landmarks [m]
    sigma_landmark_process: float = 0.001  # Small noise if landmarks are static

    # Fault detection
    chi2_gate: float = 0.99  # Confidence level for innovation gating

    # USBL/LBL integration
    usbl_update_every: int = 10  # USBL (range+bearing) every N steps
    lbl_update_every: int = 2   # LBL (ranges) more frequent

    # Visualization
    plot_traj: bool = True
    plot_cov: bool = True
    plot_every: int = 3
    plot_landmarks: bool = True


# ────────────────────────────────────────────────
# 1. Ocean current model (smooth & time-varying) — Now to be estimated
# ────────────────────────────────────────────────
def true_ocean_current(t: float) -> np.ndarray:
    """True unknown current for simulation [cx, cy] in m/s"""
    cx = 0.4 * np.sin(0.007 * t) + 0.15 * np.sin(0.028 * t + 1.2)
    cy = 0.32 * np.cos(0.012 * t) + 0.11 * np.cos(0.035 * t + 0.8)
    return np.array([cx, cy])


# ────────────────────────────────────────────────
# 2. Measurement models
# ────────────────────────────────────────────────
# 2.1 LBL: Range-only to landmarks (beacons/transponders)
def simulate_lbl_ranges(true_pose: np.ndarray, true_landmarks: np.ndarray,
                        sigma: float = 0.3) -> np.ndarray:
    """
    true_pose : [x, y, yaw]
    true_landmarks : (n_lm, 2)
    Returns noisy ranges
    """
    deltas = true_landmarks - true_pose[:2]
    r_true = np.linalg.norm(deltas, axis=1)
    r_noisy = r_true + np.random.normal(0, sigma, len(r_true))
    return np.maximum(r_noisy, 0.01)


def predicted_lbl_ranges(pose: np.ndarray, landmarks: np.ndarray) -> np.ndarray:
    deltas = landmarks - pose[:2]
    return np.linalg.norm(deltas, axis=1)


# 2.2 USBL: Range + Bearing from a surface reference (simulated as to one 'surface' landmark)
def simulate_usbl(true_pose: np.ndarray, surface_pos: np.ndarray,
                  sigma_r: float, sigma_b: float) -> np.ndarray:
    """
    Returns [range, bearing] noisy measurement
    Bearing is relative to world (absolute direction)
    """
    dx, dy = surface_pos - true_pose[:2]
    r_true = np.hypot(dx, dy)
    b_true = np.arctan2(dy, dx) - true_pose[2]  # Relative bearing
    b_true = np.arctan2(np.sin(b_true), np.cos(b_true))
    return np.array([
        r_true + np.random.normal(0, sigma_r),
        b_true + np.random.normal(0, sigma_b)
    ])


def predicted_usbl(pose: np.ndarray, surface_pos: np.ndarray) -> np.ndarray:
    dx, dy = surface_pos - pose[:2]
    r = np.hypot(dx, dy)
    b = np.arctan2(dy, dx) - pose[2]
    b = np.arctan2(np.sin(b), np.cos(b))
    return np.array([r, b])


# ────────────────────────────────────────────────
# 3. EKF-SLAM with current estimation & USBL/LBL fusion
# ────────────────────────────────────────────────
# State: [x, y, yaw, cx, cy, lm1x, lm1y, ..., lmn_x, lmn_y]
# Landmarks are static, currents are slowly varying (random walk)


def initialize_slam_state(init_pose: np.ndarray, init_current: np.ndarray = np.zeros(2),
                          known_landmarks: Optional[np.ndarray] = None) -> Tuple[np.ndarray, np.ndarray]:
    """Initial state and covariance"""
    x = np.concatenate([init_pose, init_current])
    P_diag = [1.0, 1.0, 0.1, 0.2, 0.2]  # pose + current unc

    if known_landmarks is not None:
        n_lm = len(known_landmarks)
        x = np.concatenate([x, known_landmarks.flatten()])
        P_diag += [0.01] * (2 * n_lm)  # Known landmarks have low unc
    else:
        n_lm = 0

    P = np.diag(P_diag)
    return x, P


def ekf_slam_predict(x: np.ndarray, P: np.ndarray, u: Tuple[float, float],
                     dt: float, Q: np.ndarray, n_lm: int) -> Tuple[np.ndarray, np.ndarray]:
    """
    u = (v_forward, yaw_rate) — currents are estimated in state
    State: [pose(3), current(2), landmarks(2*n_lm)]
    """
    v, ω = u
    θ = x[2]
    cx, cy = x[3:5]

    # Predict pose
    x_new = x.copy()
    x_new[0] += (v * np.cos(θ) + cx) * dt
    x_new[1] += (v * np.sin(θ) + cy) * dt
    x_new[2] += ω * dt
    x_new[2] = np.arctan2(np.sin(x_new[2]), np.cos(x_new[2]))

    # Currents: random walk (small process noise)
    # Landmarks: static

    # Jacobian F
    n_state = 5 + 2 * n_lm
    F = np.eye(n_state)
    F[0, 2] = -v * np.sin(θ) * dt
    F[1, 2] =  v * np.cos(θ) * dt
    F[0, 3] = dt
    F[1, 4] = dt

    P_new = F @ P @ F.T + Q
    return x_new, P_new


def ekf_slam_update_lbl(x: np.ndarray, P: np.ndarray, z: np.ndarray, R: np.ndarray,
                        n_lm: int, fault_detect: bool = True,
                        chi2_gate: float = 0.99) -> Tuple[np.ndarray, np.ndarray, bool]:
    """
    LBL range-only update — handles known/estimated landmarks
    Returns updated x, P, and fault_flag
    """
    pose = x[:3]
    landmarks = x[5:].reshape((n_lm, 2))

    z_pred = predicted_lbl_ranges(pose, landmarks)

    # Jacobian H (∂ranges / ∂state) — only wrt pose and landmarks
    H = np.zeros((n_lm, len(x)))
    for i in range(n_lm):
        dx, dy = landmarks[i] - pose[:2]
        r = np.hypot(dx, dy) + 1e-9
        # ∂r / ∂pose
        H[i, 0] = -dx / r
        H[i, 1] = -dy / r
        H[i, 2] = 0.0
        # ∂r / ∂current = 0
        # ∂r / ∂lm_i
        lm_idx = 5 + 2 * i
        H[i, lm_idx]   = dx / r
        H[i, lm_idx+1] = dy / r

    innovation = z - z_pred
    S = H @ P @ H.T + R
    try:
        S_inv = np.linalg.inv(S)
    except np.linalg.LinAlgError:
        return x, P, True  # Fault: singular S

    # Fault detection: chi-squared gate for entire innovation vector
    fault = False
    if fault_detect:
        mahalanobis = innovation.T @ S_inv @ innovation
        gate_thresh = chi2.ppf(chi2_gate, df=len(z))
        if mahalanobis > gate_thresh:
            fault = True
            return x, P, fault  # Skip update on fault

    K = P @ H.T @ S_inv
    x_upd = x + K @ innovation
    x_upd[2] = np.arctan2(np.sin(x_upd[2]), np.cos(x_upd[2]))

    # Joseph form
    n = len(x)
    I_KH = np.eye(n) - K @ H
    P_upd = I_KH @ P @ I_KH.T + K @ R @ K.T

    return x_upd, P_upd, fault


def ekf_slam_update_usbl(x: np.ndarray, P: np.ndarray, z: np.ndarray, surface_pos: np.ndarray,
                         R_usbl: np.ndarray, fault_detect: bool = True,
                         chi2_gate: float = 0.99) -> Tuple[np.ndarray, np.ndarray, bool]:
    """
    USBL update: range + relative bearing to surface reference
    Surface_pos assumed known (e.g., GPS on ship)
    """
    pose = x[:3]
    z_pred = predicted_usbl(pose, surface_pos)

    # Jacobian H (∂[r,b] / ∂state)
    dx, dy = surface_pos - pose[:2]
    r = np.hypot(dx, dy) + 1e-9
    H = np.zeros((2, len(x)))
    # ∂r / ∂pose
    H[0, 0] = -dx / r
    H[0, 1] = -dy / r
    H[0, 2] = 0.0
    # ∂b / ∂pose
    H[1, 0] =  dy / r**2
    H[1, 1] = -dx / r**2
    H[1, 2] = -1.0
    # No dep on current or landmarks

    innovation = z - z_pred
    innovation[1] = np.arctan2(np.sin(innovation[1]), np.cos(innovation[1]))  # Wrap bearing innov

    S = H @ P @ H.T + R_usbl
    try:
        S_inv = np.linalg.inv(S)
    except np.linalg.LinAlgError:
        return x, P, True

    fault = False
    if fault_detect:
        mahalanobis = innovation.T @ S_inv @ innovation
        gate_thresh = chi2.ppf(chi2_gate, df=2)
        if mahalanobis > gate_thresh:
            fault = True
            return x, P, fault

    K = P @ H.T @ S_inv
    x_upd = x + K @ innovation
    x_upd[2] = np.arctan2(np.sin(x_upd[2]), np.cos(x_upd[2]))

    I_KH = np.eye(len(x)) - K @ H
    P_upd = I_KH @ P @ I_KH.T + K @ R_usbl @ K.T

    return x_upd, P_upd, fault


# For SLAM: Adding new landmarks (data association simplified — assume known IDs)
def add_new_landmark(x: np.ndarray, P: np.ndarray, z_range: float, bearing_est: Optional[float] = None,
                     sigma_lm: float = 5.0) -> Tuple[np.ndarray, np.ndarray]:
    """
    Initialize new landmark using range (from LBL) and optional bearing (if USBL-like)
    Here, simplistic: assume we can estimate relative bearing somehow, or use current pose
    For demo, use pose yaw as approx bearing (not accurate, but for init)
    """
    pose = x[:3]
    if bearing_est is None:
        bearing_est = pose[2]  # Assume landmark ahead — toy

    lm_x = pose[0] + z_range * np.cos(pose[2] + bearing_est)
    lm_y = pose[1] + z_range * np.sin(pose[2] + bearing_est)

    # Augment state
    x_new = np.append(x, [lm_x, lm_y])

    # Augment P — new diag block, cross terms approx zero
    n = len(x)
    P_new = np.zeros((n+2, n+2))
    P_new[:n, :n] = P
    P_new[n:, n:] = np.eye(2) * sigma_lm**2

    return x_new, P_new


# ────────────────────────────────────────────────
# Main simulation & visualization — Research Architecture Flow
# ────────────────────────────────────────────────
def run_advanced_simulation(params: Params):
    # ── Setup ─────────────────────────────────────
    # True landmarks (unknown to filter initially for SLAM)
    true_landmarks = np.array([
        [10, 50],
        [60, 20],
        [45, -30],
        [-5, -20],
        [70, 40]
    ])
    n_lm_true = len(true_landmarks)

    # Surface position for USBL (known, e.g., ship GPS)
    surface_pos = np.array([0, 0])  # Fixed for simplicity

    # Noise covariances
    base_Q = np.diag([params.sigma_process_xy**2,
                      params.sigma_process_xy**2,
                      params.sigma_process_yaw**2,
                      params.sigma_current**2,
                      params.sigma_current**2])
    R_lbl = np.eye(n_lm_true) * params.sigma_range**2
    R_usbl = np.diag([params.sigma_range**2, params.sigma_bearing**2])

    # Initial conditions — SLAM starts with no landmarks
    x_true = np.array([0.0, 0.0, np.deg2rad(30.0)])
    init_est_pose = x_true + np.random.normal(0, [1.5, 1.5, 0.2])
    init_current = np.array([0.1, -0.1])  # Biased init
    x_est, P_est = initialize_slam_state(init_est_pose, init_current)
    n_lm_est = 0  # Start with 0 landmarks

    # For dynamic Q and R as landmarks added
    def get_Q(n_lm: int):
        return np.block([
            [base_Q, np.zeros((5, 2*n_lm))],
            [np.zeros((2*n_lm, 5)), np.eye(2*n_lm) * params.sigma_landmark_process**2]
        ])

    # Logging
    times = []
    true_traj = []
    est_traj = []
    est_current_log = []
    est_lm_log = []  # List of estimated lm positions over time
    fault_count = 0

    # ── Simulation loop ───────────────────────────
    step = 0
    for t in np.arange(0.0, params.T_total + params.dt/2, params.dt):
        # Motion Model ─────────────────────────────
        current_true = true_ocean_current(t)
        v_body = params.v_nom
        yaw_rate = params.yaw_rate

        # True state update (Dead Reckoning ground truth)
        x_true[0] += (v_body * np.cos(x_true[2]) + current_true[0]) * params.dt
        x_true[1] += (v_body * np.sin(x_true[2]) + current_true[1]) * params.dt
        x_true[2] += yaw_rate * params.dt
        x_true[2] = np.arctan2(np.sin(x_true[2]), np.cos(x_true[2]))

        # Sensor Simulation ────────────────────────
        z_lbl = simulate_lbl_ranges(x_true, true_landmarks, params.sigma_range)
        if step % params.usbl_update_every == 0:
            z_usbl = simulate_usbl(x_true, surface_pos, params.sigma_range, params.sigma_bearing)
        else:
            z_usbl = None

        # Occasionally simulate fault (e.g., outlier in one range)
        if np.random.rand() < 0.05:  # 5% chance
            fault_idx = np.random.randint(0, len(z_lbl))
            z_lbl[fault_idx] += np.random.normal(0, 5 * params.sigma_range)  # Large outlier

        # Dead Reckoning (predict) ─────────────────
        Q = get_Q(n_lm_est)
        x_est, P_est = ekf_slam_predict(x_est, P_est, u=(v_body, yaw_rate),
                                        dt=params.dt, Q=Q, n_lm=n_lm_est)

        # EKF Fusion ───────────────────────────────
        # First, USBL if available (absolute ref)
        if z_usbl is not None:
            x_est, P_est, fault_usbl = ekf_slam_update_usbl(x_est, P_est, z_usbl, surface_pos,
                                                            R_usbl, chi2_gate=params.chi2_gate)
            if fault_usbl:
                fault_count += 1

        # LBL ranges (to all landmarks — assume data assoc by ID for simplicity)
        # For full SLAM, if n_lm_est < n_lm_true, 'discover' new ones
        if n_lm_est < n_lm_true:
            # Toy discovery: add one by one every few steps
            if step % 50 == 0 and n_lm_est < n_lm_true:
                # Use first unused range as new lm init (assume bearing approx 0 rel)
                new_z = z_lbl[n_lm_est]
                x_est, P_est = add_new_landmark(x_est, P_est, new_z,
                                                bearing_est=0.0,  # Approx
                                                sigma_lm=params.sigma_landmark_init)
                n_lm_est += 1
                # Adjust R_lbl for current n_lm
                R_lbl = np.eye(n_lm_est) * params.sigma_range**2
            else:
                # Only update existing
                z_lbl = z_lbl[:n_lm_est]

        if step % params.lbl_update_every == 0 and n_lm_est > 0:
            x_est, P_est, fault_lbl = ekf_slam_update_lbl(x_est, P_est, z_lbl[:n_lm_est], R_lbl,
                                                          n_lm=n_lm_est, chi2_gate=params.chi2_gate)
            if fault_lbl:
                fault_count += 1

        # Robust Pose Estimation ───────────────────
        # Here, already handled by EKF + gating; could add more AI (e.g., NN outlier detector) but chi2 for now

        # ── Logging ───────────────────────────────
        if step % params.plot_every == 0:
            times.append(t)
            true_traj.append(x_true[:2].copy())
            est_traj.append(x_est[:2].copy())
            est_current_log.append(x_est[3:5].copy())
            if n_lm_est > 0:
                est_lm_log.append(x_est[5:].reshape((n_lm_est, 2)).copy())
            else:
                est_lm_log.append(np.array([]))

        step += 1

    print(f"Total faults detected and rejected: {fault_count}")

    # ── Visualization ─────────────────────────────
    if not params.plot_traj:
        return

    true_traj = np.array(true_traj)
    est_traj = np.array(est_traj)
    est_current_log = np.array(est_current_log)

    fig, axs = plt.subplots(1, 2, figsize=(18, 8))

    # Trajectory plot
    ax = axs[0]
    ax.plot(true_traj[:,0], true_traj[:,1], 'C0-', lw=2.2, label='True path')
    ax.plot(est_traj[:,0],  est_traj[:,1],  'C1--', lw=1.8, label='SLAM-EKF estimate')

    # True landmarks
    ax.plot(true_landmarks[:,0], true_landmarks[:,1], 'r^', ms=12, label='True landmarks')

    # Estimated landmarks (final)
    if n_lm_est > 0:
        final_lms = est_lm_log[-1]
        ax.plot(final_lms[:,0], final_lms[:,1], 'g*', ms=10, label='Est landmarks')

    # Surface pos
    ax.plot(surface_pos[0], surface_pos[1], 'bD', ms=10, label='USBL surface ref')

    # Simple cov ellipses (pose only, every few)
    if params.plot_cov:
        for i in range(0, len(est_traj), max(1, len(est_traj)//30)):
            pos = est_traj[i]
            cov_xy = P_est[:2, :2]  # Approx final cov for simplicity
            sig_xy = 3 * np.sqrt(np.diag(cov_xy))
            rect = plt.Rectangle(pos - sig_xy, 2*sig_xy[0], 2*sig_xy[1],
                                 fc='orange', ec='none', alpha=0.15, zorder=1)
            ax.add_patch(rect)

    ax.set_aspect('equal')
    ax.grid(alpha=0.3, ls=':')
    ax.legend(loc='upper left', fontsize=10)
    ax.set_title("EKF-SLAM with USBL/LBL, Current Est, Fault Detection")
    ax.set_xlabel("East [m]"), ax.set_ylabel("North [m]")

    # Current estimation plot
    ax = axs[1]
    true_currents = np.array([true_ocean_current(t) for t in times])
    ax.plot(times, true_currents[:,0], 'C0-', label='True cx')
    ax.plot(times, true_currents[:,1], 'C0--', label='True cy')
    ax.plot(times, est_current_log[:,0], 'C1-', label='Est cx')
    ax.plot(times, est_current_log[:,1], 'C1--', label='Est cy')
    ax.grid(alpha=0.3)
    ax.legend()
    ax.set_title("Ocean Current Compensation / Estimation")
    ax.set_xlabel("Time [s]"), ax.set_ylabel("Current [m/s]")

    plt.tight_layout()
    plt.show()


if __name__ == "__main__":
    cfg = Params()
    # Tune as needed:
    # cfg.T_total = 80
    # cfg.yaw_rate = 0.05
    # cfg.sigma_range = 0.45
    # cfg.usbl_update_every = 15

    run_advanced_simulation(cfg)